<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technological Dependencies</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Technological dependencies</h1>

    <p>
        Technology can spread misinformation, affect an individual's perception of reality 
        and distance them from the real world, immersing the victim in a fake virtual world. 
        Especially in young people.
    </p>

    <img 
        src="https://www.uopeople.edu/wp-content/uploads/2022/06/Is-Society-Too-Dependent-On-Technology-10-Shocking-Facts-550x385.jpg.webp" 
        alt="Technology dependence illustration"
    >

   
    <div class="kawaii-widget">
        <p id="clock"></p>
    </div>

    
    <img 
        src="https://img1.picmix.com/output/stamp/normal/2/1/0/7/2587012_19544.png" 
        alt="Kawaii decoration"
        class="kawaii-corner"
    >

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById("clock").textContent =
                now.toLocaleTimeString();
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
